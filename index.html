<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />

    <meta name="description" content="Portfolio de Mamoun Berthe, développeur web & applications, spécialisé React, Laravel et solutions modernes." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Mamoun Berthe | Développeur Web & Applications</title>
    <script>
      (function () {
        const STORAGE_KEY = "portfolio-theme";
        const savedTheme = localStorage.getItem(STORAGE_KEY);
        const systemPrefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        const theme = savedTheme === "light" || savedTheme === "dark" ? savedTheme : systemPrefersDark ? "dark" : "light";
        if (theme === "light") {
          document.documentElement.classList.add("light");
        }
        document.documentElement.dataset.theme = theme;
      })();
    </script>

    </script>
